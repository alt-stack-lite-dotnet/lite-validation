name: CI

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # Ручной запуск: Actions → CI → Run workflow

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Dotnet version
        run: dotnet --version

      - name: Restore
        run: dotnet restore Lite.Validation.sln

      - name: Build
        run: dotnet build Lite.Validation.sln --no-restore -c Release

      - name: Test
        run: dotnet test Lite.Validation.sln --no-build -c Release --verbosity normal

  pack:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Lite.Validation.sln

      - name: Pack
        run: |
          VER="${{ github.ref_name }}"
          if [[ "$VER" == v* ]]; then VER="${VER#v}"; fi
          dotnet pack Lite.Validation.sln -c Release --no-restore -o nupkgs -p:Version=$VER

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nupkgs
          path: nupkgs/*.nupkg

      - name: Push to NuGet.org
        run: |
          for f in nupkgs/*.nupkg; do
            dotnet nuget push "$f" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done
