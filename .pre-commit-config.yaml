# Pre-commit: https://pre-commit.com
# Установка: pip install -r requirements.txt && pre-commit install && pre-commit install --hook-type pre-push
# Линт на коммит, линт + сборка + тесты на пуш.

default_language_version:
  python: python3

repos:
  - repo: local
    hooks:
      - id: lint
        name: format (csharpier) & build
        entry: sh .config/run_lint_wrapper.sh
        language: system
        stages: [commit]
        pass_filenames: false

      - id: push-check
        name: build & test
        entry: sh .config/run_pre_push_wrapper.sh
        language: system
        stages: [push]
        pass_filenames: false
